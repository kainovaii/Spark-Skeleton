<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>UnitPanel | Dashboard</title>
    <link rel="icon" href="/assets/img/favicon-dark.png" type="image/x-icon" />
    <link href="/assets/css/tabler.css?v=1.15" rel="stylesheet" />
    <style>@import url("https://rsms.me/inter/inter.css");</style>
    <script defer src="/assets/js/app.js"></script>
</head>
<body>
<div class="page">
    <aside class="navbar navbar-vertical navbar-expand-lg" data-bs-theme="dark">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar-menu" aria-controls="sidebar-menu" aria-expanded="false" aria-label="Toggle sidebar navigation" > <span class="navbar-toggler-icon"></span> </button>
            <div class="navbar-brand navbar-brand-autodark">
                <a href="/" class="text-white" aria-label="UnitPanel"><img src="/assets/img/logo.png" alt="Logo UnitPanel" width="100px"></a>
            </div>
            <div class="collapse navbar-collapse pt-lg-3" id="sidebar-menu">
                {% include "./partials/navbar.html" %}>
            </div>
        </div>
    </aside>
    <header class="navbar navbar-expand-md d-none d-lg-flex d-print-none">
        <div class="container-xl">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu" aria-controls="navbar-menu" aria-expanded="false" aria-label="Toggle primary navigation" > <span class="navbar-toggler-icon"></span> </button>
            <div class="navbar-nav flex-row order-md-last">
                <!--
                <div class="d-none d-md-flex me-3">
                    <div class="nav-item">
                        <a href="?theme=dark" class="nav-link px-0 hide-theme-dark" title="Enable dark mode" data-bs-toggle="tooltip" data-bs-placement="bottom">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-1"><path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z"/></svg>
                        </a>
                        <a href="?theme=light" class="nav-link px-0 hide-theme-light" title="Enable light mode" data-bs-toggle="tooltip" data-bs-placement="bottom">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-1"><path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"/><path d="M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7"/></svg>
                        </a>
                    </div>
                </div>
                -->
                {% include "./partials/user-nav.html" %}
            </div>
            <div class="collapse navbar-collapse" id="navbar-menu"></div>
        </div>
    </header>
    <div class="page-wrapper">
        <div class="container-fluid">
            {% if flashes.success %}
            <div class="alert alert-success mt-3 mb-0">{{ flashes.success }}</div>
            {% endif %}
            {% if flashes.error %}
            <div class="alert alert-danger mt-3 mb-0">{{ flashes.error }}</div>
            {% endif %}
        </div>
        {% block content %}
        <!-- Contenu de la page -->
        {% endblock %}
        <footer class="footer footer-transparent d-print-none">
            <div class="container-xl">
                <div class="row text-center align-items-center flex-row-reverse">
                    <div class="col-lg-auto ms-lg-auto">
                        <ul class="list-inline list-inline-dots mb-0">
                            <li class="list-inline-item">Theme by <a href="https://tabler.io" target="_blank" class="link-primary" rel="noopener">Tabler</a></li>
                        </ul>
                    </div>
                    <div class="col-12 col-lg-auto mt-3 mt-lg-0">
                        <ul class="list-inline list-inline-dots mb-0">
                            <li class="list-inline-item">
                                Copyright &copy; 2025 UnitPanel. By <a href="https://github.com/kainovaii" target="_blank" class="link-primary" rel="noopener">KainoVaii</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </footer>
    </div>
</div>
<script src="/assets/js/bundle.min.js" defer></script>
</body>
</html>
